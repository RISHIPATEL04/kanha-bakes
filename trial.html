<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Web Page</title>
</head>
<body>
    <h1>Welcome to registration form</h1>
<!--starting of form-->

  <label for="name">Name:</label><br>
  <input type="text" name="name" placeholder="Enter your name"><br><br>

  <label for="email">Email:</label><br>
  <input type="email"  name="email" placeholder="Enter your email"><br><br>
  
   <label for="Password">Password:</label><br>
  <input type="Password"  name="password" placeholder="Enter your passsword"><br><br>


  <!--gender-->
  
  <h3>gender</h3>
  <label for="gender"></label>
<input type="radio"  name="gender" value="male">
<label for="gender">male</label>
 <input type="radio"  name="gender" value="female">
<label for="gender">female</label>


<!--hobbies-->

<h3>hobbies</h3>
<label for="hobbies"></label>
<input type="checkbox"  name="hobbies" value="cricket">
<label for="hobbies">cricket</label><br>
<input type="checkbox"  name="hobbies" value="volleyball">
<label for="hobbies">volleyball</label><br>
<input type="checkbox"  name="hobbies" value="football">
<label for="hobbies">football</label><br> <br


<!--date-->


<label for="date">Enter your DOB</label>
<input type="date"><br><br>

<!--search-->


    <label for="search">Search</label>
    <input type="search"  placeholder="Search here"><br><br>


<!--file upload-->
<label for="file">Upload File:</label>
<input type="file"name="file"><br><br>

<!--color-->
<label for="color">Choose a color:</label>
<input type="color" name="color"><br><br>


<!--range-->
<label for="range">Select a range:</label>
<input type="range" min="0" max="10"><br><br>


<!--submit and reset-->
      <input type="submit" value="Submit"><br>
<br>
   <input type="reset" value="reset"><br>
</form> 
</body>
</html>
