<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Admin Dashboard - Kanha Cakes</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <a href="index.html">
                    <span class="logo-text">Kanha Bakery Admin</span>
                </a>
            </div>
            <div class="nav-menu">
                <a href="index.html" class="nav-link">Main Site</a>
                <div id="authSection"></div>
            </div>
            <div class="mobile-menu-btn" id="mobileMenuBtn">☰</div>
        </div>
    </nav>

    <main class="admin-page">
        <section class="admin-header">
            <div class="container header-flex">
                <h1 class="page-title">Admin Dashboard</h1>
                <button id="exportCsvBtn" class="export-btn">📥 Export to CSV / Excel</button>
            </div>
        </section>

        <section class="admin-tabs-section">
            <div class="container">
                <div class="admin-tabs">
                    <button class="tab-btn active" data-target="orders-view">Manage Orders</button>
                    <button class="tab-btn" data-target="products-view">Manage Products</button>
                </div>
            </div>
        </section>

        <!-- Orders View -->
        <section id="orders-view" class="admin-table-section tab-content active">
            <div class="container">
                <div class="table-card">
                    <div class="table-responsive">
                        <table id="ordersTable">
                            <thead>
                                <tr>
                                    <th>Order ID</th>
                                    <th>Date Placed</th>
                                    <th>Customer Info</th>
                                    <th>Order Details</th>
                                    <th>Status</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="ordersTableBody">
                                <!-- Orders injected here via JS -->
                            </tbody>
                        </table>
                        <div id="loadingMessage" class="loading-state">Loading orders...</div>
                        <div id="emptyMessage" class="empty-state hidden">No orders found.</div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Products View -->
        <section id="products-view" class="admin-table-section tab-content hidden">
            <div class="container">
                <div class="section-actions" style="margin-bottom: 1rem; text-align: right;">
                    <button id="addProductBtn" class="export-btn" style="background: #10b981;">➕ Add New Cake</button>
                </div>
                <div class="table-card">
                    <div class="table-responsive">
                        <table id="productsTable">
                            <thead>
                                <tr>
                                    <th>Image</th>
                                    <th>Name</th>
                                    <th>Category</th>
                                    <th>Price</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="productsTableBody">
                            </tbody>
                        </table>
                        <div id="productsLoadingMessage" class="loading-state">Loading products...</div>
                        <div id="productsEmptyMessage" class="empty-state hidden">No products found.</div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Product Modal -->
    <div id="productModal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Cake</h2>
                <button class="modal-close-icon close-modal">&times;</button>
            </div>
            <form id="productForm">
                <input type="hidden" id="productId">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="productName" required>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="productCategory" required>
                        <option value="Cakes">Cakes</option>
                        <option value="Chocolates">Chocolates</option>
                        <option value="Cookies">Cookies</option>
                        <option value="Pastries">Pastries</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Price</label>
                    <input type="number" step="0.01" id="productPrice" required>
                </div>
                <div class="form-group">
                    <label>Image URL</label>
                    <input type="url" id="productImage" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="productDescription" rows="3" required></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="cancel-btn close-modal">Cancel</button>
                    <button type="submit" class="save-btn">Save Cake</button>
                </div>
            </form>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="client-auth.js"></script>
    <script src="navigation.js"></script>
    <script src="admin.js"></script>
</body>
</html>
